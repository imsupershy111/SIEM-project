server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push
    tenant_id: fake

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  - job_name: langchain_pipeline
    static_configs:
      - targets:
          - localhost
        labels:
          job: langchain_pipeline
          app: analyzer
          __path__: /home/imsupershy/monitoring-project/langchain_pipeline/logs/*.log
  - job_name: ai_analyzer
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai_analyzer
          __path__: /home/imsupershy/monitoring-project/langchain_pipeline/logs/ai_insights.json
  - job_name: blocked_ips_sync
    static_configs:
      - targets:
          - localhost
        labels:
          job: blocked_ips
          __path__: /home/imsupershy/monitoring-project/langchain_pipeline/logs/blocked_ips.json

    pipeline_stages:
      - json:
          expressions:
            # Vì blocked_ips.json là dạng Dict, ta cần parse để lấy thông tin
            blocked_ip:
            reason: reason
            blocked_at: blocked_at
